name: Java CI with Maven on Windows and Mac

on:
  push:
    paths-ignore:
     - 'README.md'
  pull_request:
    paths-ignore:
     - 'README.md'

jobs:
  build:
    strategy:
      matrix:
        os: ['macos-latest', 'windows-latest']
      fail-fast: false
    runs-on: ${{ matrix.os }}

    steps:
    - uses: actions/checkout@v6
    - name: Set up JDK
      uses: actions/setup-java@v5
      with:
       java-version: 21
       distribution: temurin
    - name: Cache Maven packages
      uses: actions/cache@v5
      with:
        path: ~/.m2
        key: ${{ runner.os }}-m2-${{ hashFiles('**/pom.xml', '**/*.yml', '**/*.target') }}
        restore-keys: ${{ runner.os }}-m2-
    - name: Dismiss macOS Analytics setup dialog
      if: runner.os == 'macOS'
      shell: bash
      run: |
        for i in {1..30}; do
          if pgrep -x "Setup Assistant" >/dev/null; then
            echo "Found macOS Setup Assistant; trying to dismiss it"
            osascript <<'APPLESCRIPT' || true
            tell application "System Events"
              if exists process "Setup Assistant" then
                tell process "Setup Assistant"
                  set frontmost to true
                  delay 0.2
                  try
                    click button "Continue" of window 1
                  on error
                    key code 36
                  end try
                end tell
              end if
            end tell
        APPLESCRIPT
            sleep 2
            pgrep -x "Setup Assistant" >/dev/null || exit 0
          fi
          sleep 1
        done
    - name: Build with Maven
      run: >
        ./mvnw
        -f xklaim/xklaim.parent/pom.xml
        verify
        '-Dskip.imc.tests=true'
        '-Ptest-ide'
    - name: Archive Test Results
      uses: actions/upload-artifact@v7
      if: ${{ failure() || cancelled() }}
      with:
        name: test-results-${{ runner.os }}
        path: '**/*.tests/target/surefire-reports'
    - name: Archive UI Tests Screenshots
      uses: actions/upload-artifact@v7
      if: ${{ failure() || cancelled() }}
      with:
        name: screenshots-${{ runner.os }}
        path: '**/*.tests/screenshots'
    - name: Archive Logs
      uses: actions/upload-artifact@v7
      if: ${{ failure() || cancelled() }}
      with:
        name: logs-${{ runner.os }}
        path: '**/*.tests/target/**/*.log'
